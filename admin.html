<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gritto Admin — Beta Users</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12172B; --teal:#1C7293; --mint:#4ECDC4; --coral:#FF6B5D;
    --paper:#F7F9FB; --slate:#2A3142; --slate-soft:#6B7488; --line:#E4E9EF;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); font-family:'Inter',sans-serif; color:var(--slate);}
  .wrap{max-width:640px; margin:0 auto; padding:40px 20px;}
  h1{font-family:'Anton',sans-serif; font-weight:400; text-transform:uppercase; font-size:28px; margin:0 0 4px;}
  .sub{color:var(--slate-soft); font-size:13px; margin:0 0 28px;}

  .login-box{
    background:#fff; border:1px solid var(--line); border-radius:16px;
    padding:24px; max-width:340px; margin:60px auto;
  }
  .login-box input{
    width:100%; border:1.5px solid var(--line); border-radius:10px;
    padding:11px 13px; font-size:14px; margin-bottom:12px;
  }
  .btn{
    background:var(--ink); color:#fff; border:none; font-weight:700;
    font-size:14px; padding:12px; border-radius:10px; cursor:pointer; width:100%;
  }
  .btn.small{width:auto; padding:8px 14px; font-size:12.5px; background:var(--coral);}
  .btn.add{background:var(--teal);}
  .error{color:#B4401A; font-size:12.5px; margin-top:8px; min-height:16px;}

  .hidden{display:none;}

  .add-row{display:flex; gap:8px; margin-bottom:24px;}
  .add-row input{
    flex:1; border:1.5px solid var(--line); border-radius:10px;
    padding:11px 13px; font-size:14px;
  }

  .user-row{
    display:flex; align-items:center; justify-content:space-between;
    background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; margin-bottom:8px;
  }
  .user-email{font-size:14px; font-weight:600;}
  .user-date{font-size:11.5px; color:var(--slate-soft); font-family:'IBM Plex Mono',monospace;}
  .empty{color:var(--slate-soft); font-size:13px; text-align:center; padding:30px 0;}
</style>
</head>
<body>
<div class="wrap">

  <div class="login-box" id="admin-login">
    <h1 style="font-size:20px;">Admin</h1>
    <p class="sub">Enter your admin password to manage beta users.</p>
    <input type="password" id="admin-password-input" placeholder="Admin password">
    <button class="btn" onclick="adminLogin()">Enter</button>
    <div class="error" id="admin-login-error"></div>
  </div>

  <div id="admin-panel" class="hidden">
    <h1>Beta Users</h1>
    <p class="sub">People on this list can sign in to Gritto with Google. Everyone else is blocked.</p>

    <div class="add-row">
      <input type="email" id="new-email" placeholder="someone@gmail.com">
      <button class="btn add" style="width:auto; padding:11px 16px;" onclick="addUser()">Add</button>
    </div>
    <div class="error" id="add-error"></div>

    <div id="user-list"></div>
  </div>

</div>

<script>
let adminPassword = '';

function adminLogin(){
  adminPassword = document.getElementById('admin-password-input').value;
  document.getElementById('admin-login-error').textContent = '';
  loadUsers();
}

async function loadUsers(){
  try{
    const res = await fetch('/api/admin-users', {
      headers: { 'x-admin-password': adminPassword }
    });
    const data = await res.json();
    if(!data.ok){
      document.getElementById('admin-login-error').textContent = data.error || 'Wrong password.';
      return;
    }
    document.getElementById('admin-login').classList.add('hidden');
    document.getElementById('admin-panel').classList.remove('hidden');
    renderUsers(data.users || []);
  }catch(err){
    document.getElementById('admin-login-error').textContent = 'Something went wrong — try again.';
  }
}

function renderUsers(users){
  const list = document.getElementById('user-list');
  if(users.length === 0){
    list.innerHTML = '<div class="empty">No beta users added yet.</div>';
    return;
  }
  list.innerHTML = users.map(u => `
    <div class="user-row">
      <div>
        <div class="user-email">${u.email}</div>
        <div class="user-date">added ${new Date(u.added_at).toLocaleDateString()}</div>
      </div>
      <button class="btn small" onclick="removeUser('${u.email}')">Remove</button>
    </div>
  `).join('');
}

async function addUser(){
  const emailInput = document.getElementById('new-email');
  const email = emailInput.value.trim();
  const errorEl = document.getElementById('add-error');
  errorEl.textContent = '';
  if(!email){ errorEl.textContent = 'Enter an email first.'; return; }

  try{
    const res = await fetch('/api/admin-users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if(!data.ok){ errorEl.textContent = data.error || 'Could not add that email.'; return; }
    emailInput.value = '';
    loadUsers();
  }catch(err){
    errorEl.textContent = 'Something went wrong — try again.';
  }
}

async function removeUser(email){
  try{
    await fetch('/api/admin-users', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ email })
    });
    loadUsers();
  }catch(err){
    alert('Could not remove that user — try again.');
  }
}

document.getElementById('admin-password-input').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') adminLogin();
});
</script>
</body>
</html>
